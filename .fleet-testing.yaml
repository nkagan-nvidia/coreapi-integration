version: "1"

default_mode: correctness

tracks:
  api:
    description: "CoreAPI surface correctness — request/response contracts, error handling, edge cases"
    external_repo: NVIDIA-dev/omniverse-api-core-tests-srtx-api-test
    signal:
      pass_fail: true
      metrics: false
    modes: [correctness, comparative, milestone]
    parallel_group: candidate
    cli: "<TBD>"
    output:
      ctrf: true
      otlp: false

  benchmark:
    description: "Throughput, latency, and resource utilization"
    external_repo: NVIDIA-dev/omniverse-api-core-tests-srtx-api-test
    signal:
      pass_fail: true
      metrics: true
    modes: [correctness, comparative]
    parallel_group: candidate
    cli: "<TBD>"
    output:
      ctrf: true
      otlp: true

  mega_small:
    description: "End-to-end Mega integration — small simulation payload"
    external_repo: NVIDIA-dev/omniverse-mega-dev
    external_path: blueprints/mega/mega-simulation
    signal:
      pass_fail: true
      metrics: true
    milestone_thresholds: {}
    modes: [correctness, comparative, milestone]
    parallel_group: candidate
    opt_in: false
    cli: "<TBD>"
    output:
      ctrf: true
      otlp: true

  mega_large:
    description: "End-to-end Mega integration — large simulation payload (opt-in)"
    external_repo: NVIDIA-dev/omniverse-mega-dev
    external_path: blueprints/mega/mega-simulation
    signal:
      pass_fail: true
      metrics: true
    milestone_thresholds: {}
    modes: [correctness, comparative, milestone]
    parallel_group: candidate
    opt_in: true
    cli: "<TBD>"
    output:
      ctrf: true
      otlp: true

baseline:
  required_for: [comparative, milestone]
  tracks: [api, benchmark, mega_small, mega_large]

envelope:
  schema_version: "1"
  result_file: ".suite-result.json"
